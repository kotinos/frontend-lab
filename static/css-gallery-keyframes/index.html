<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Keyframe Gallery — Glass Masonry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        --glass: rgba(18, 22, 36, 0.55);
        --glass-border: rgba(255, 255, 255, 0.12);
        --glow: 0 0 40px rgba(120, 200, 255, 0.35);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Outfit, system-ui, sans-serif;
        background: radial-gradient(1200px 800px at 20% 0%, #1a2454 0%, transparent 55%),
          radial-gradient(900px 600px at 90% 20%, #3a1f52 0%, transparent 50%),
          linear-gradient(160deg, #070a12 0%, #0c1020 40%, #05060c 100%);
        color: #e8ecff;
      }
      header {
        padding: 2.5rem 1.5rem 1rem;
        text-align: center;
      }
      header h1 {
        margin: 0 0 0.5rem;
        font-weight: 700;
        letter-spacing: -0.03em;
        font-size: clamp(1.75rem, 4vw, 2.75rem);
      }
      header p {
        margin: 0 auto;
        max-width: 46ch;
        opacity: 0.78;
        font-weight: 300;
        line-height: 1.6;
      }
      .masonry {
        column-count: 3;
        column-gap: 1.25rem;
        padding: 1.5rem clamp(1rem, 3vw, 3rem) 4rem;
        max-width: 1200px;
        margin: 0 auto;
      }
      @media (max-width: 900px) {
        .masonry {
          column-count: 2;
        }
      }
      @media (max-width: 520px) {
        .masonry {
          column-count: 1;
        }
      }
      .card {
        break-inside: avoid;
        margin-bottom: 1.25rem;
        border-radius: 1.25rem;
        overflow: hidden;
        background: var(--glass);
        border: 1px solid var(--glass-border);
        backdrop-filter: blur(18px) saturate(140%);
        -webkit-backdrop-filter: blur(18px) saturate(140%);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
        transform-style: preserve-3d;
        perspective: 1200px;
        transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.45s ease;
      }
      .card figure {
        margin: 0;
        position: relative;
        overflow: hidden;
      }
      .card img {
        display: block;
        width: 100%;
        height: auto;
        transform-origin: center center;
        transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1), filter 0.55s ease;
        will-change: transform;
      }
      .card figcaption {
        padding: 0.85rem 1rem 1.1rem;
        font-size: 0.9rem;
        font-weight: 500;
        letter-spacing: 0.02em;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent);
      }
      .card:hover {
        animation: floaty 2.4s ease-in-out infinite alternate;
        box-shadow: var(--glow), 0 28px 60px rgba(0, 0, 0, 0.55);
      }
      .card:hover img {
        animation: flip-tilt 1.1s ease-in-out forwards, breathe 3s ease-in-out 1.1s infinite;
        filter: saturate(1.15) brightness(1.08);
      }
      @keyframes floaty {
        from {
          transform: translateY(0) rotateX(0deg);
        }
        to {
          transform: translateY(-10px) rotateX(4deg);
        }
      }
      @keyframes flip-tilt {
        0% {
          transform: scale(1) rotateY(0deg);
        }
        40% {
          transform: scale(1.04) rotateY(12deg) rotateX(2deg);
        }
        100% {
          transform: scale(1.07) rotateY(-6deg) rotateX(-3deg);
        }
      }
      @keyframes breathe {
        0%,
        100% {
          transform: scale(1.07) rotateY(-6deg) rotateX(-3deg);
        }
        50% {
          transform: scale(1.1) rotateY(4deg) rotateX(2deg);
        }
      }
      .card::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.45s ease;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.15), inset 0 0 60px rgba(130, 200, 255, 0.12);
      }
      .card {
        position: relative;
      }
      .card:hover::after {
        opacity: 1;
        animation: pulse-glow 1.8s ease-in-out infinite alternate;
      }
      @keyframes pulse-glow {
        from {
          filter: drop-shadow(0 0 12px rgba(120, 200, 255, 0.25));
        }
        to {
          filter: drop-shadow(0 0 28px rgba(160, 220, 255, 0.55));
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Glass Masonry Gallery</h1>
      <p>
        Hover tiles for layered motion: float, 3D tilt, scale, and luminous glass edges. Abstract photography via
        Unsplash.
      </p>
    </header>
    <main class="masonry" aria-label="Image gallery">
      <article class="card">
        <figure>
          <img
            alt="Abstract fluid shapes"
            loading="lazy"
            src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=900&q=80"
          />
          <figcaption>Chromatic drift</figcaption>
        </figure>
      </article>
      <article class="card">
        <figure>
          <img
            alt="Abstract gradient"
            loading="lazy"
            src="https://images.unsplash.com/photo-1557672172-298e0ad88fb2?auto=format&fit=crop&w=900&q=80"
          />
          <figcaption>Soft nebula</figcaption>
        </figure>
      </article>
      <article class="card">
        <figure>
          <img
            alt="Abstract paint texture"
            loading="lazy"
            src="https://images.unsplash.com/photo-1541701494587-cb58502866ab?auto=format&fit=crop&w=900&q=80"
          />
          <figcaption>Paint bloom</figcaption>
        </figure>
      </article>
      <article class="card">
        <figure>
          <img
            alt="Abstract 3D render"
            loading="lazy"
            src="https://images.unsplash.com/photo-1634017839464-5c339ebe3cb4?auto=format&fit=crop&w=900&q=80"
          />
          <figcaption>Liquid chrome</figcaption>
        </figure>
      </article>
      <article class="card">
        <figure>
          <img
            alt="Abstract waves"
            loading="lazy"
            src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=900&q=80"
          />
          <figcaption>Wave lattice</figcaption>
        </figure>
      </article>
      <article class="card">
        <figure>
          <img
            alt="Abstract lights"
            loading="lazy"
            src="https://images.unsplash.com/photo-1515462277126-2dd0c162007a?auto=format&fit=crop&w=900&q=80"
          />
          <figcaption>Bokeh storm</figcaption>
        </figure>
      </article>
    </main>
  </body>
</html>
