<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pomodoro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;700&family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="focus">
    <main class="stage">
      <p class="mode" id="mode-label">Focus</p>
      <div class="timer-wrap">
        <svg class="ring" viewBox="0 0 400 400" aria-hidden="true">
          <defs>
            <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="rgba(255,255,255,0.35)" />
              <stop offset="100%" stop-color="rgba(255,255,255,0.9)" />
            </linearGradient>
          </defs>
          <circle class="track" cx="200" cy="200" r="170" />
          <circle id="progress" class="progress" cx="200" cy="200" r="170" />
        </svg>
        <div class="readout" id="readout" role="timer" aria-live="polite">25:00</div>
      </div>
      <div class="controls">
        <button type="button" id="toggle" class="pill">Start</button>
        <button type="button" id="switch" class="ghost">Switch mode</button>
      </div>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
