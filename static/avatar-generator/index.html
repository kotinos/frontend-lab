<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Avatar Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  </head>
  <body>
    <main class="app">
      <header>
        <h1>Avatar Lab</h1>
        <p>Mix layers with springy motion.</p>
      </header>
      <nav class="tabs" aria-label="Categories">
        <button type="button" class="tab active" data-cat="face">Face</button>
        <button type="button" class="tab" data-cat="hair">Hair</button>
        <button type="button" class="tab" data-cat="acc">Accessories</button>
      </nav>
      <section class="stage">
        <div id="avatar" class="avatar" aria-live="polite">
          <span id="layer-face" class="layer">🙂</span>
          <span id="layer-hair" class="layer hair">🟣</span>
          <span id="layer-acc" class="layer acc">✨</span>
        </div>
      </section>
      <div id="picker" class="picker"></div>
      <button type="button" id="download" class="download">Download</button>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
